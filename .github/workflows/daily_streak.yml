name: Daily Streak Reminder

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC every day (10:00 German summer time)
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  streak-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send streak reminder if needed
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "from alerts.telegram_bot import send_streak_reminder; send_streak_reminder()"
